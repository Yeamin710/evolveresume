<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve Resume - Professional CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto+Mono&family=Lora:wght@400;700&family=Playfair+Display:wght@700&family=Merriweather:wght@300;400;700&family=Montserrat:wght@300;400;600;700&family=Open+Sans:wght@300;400;600;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --brand-green: #4ade80; 
            --font-family: 'Inter', sans-serif;
            --base-font-size: 14px;
            --header-align: left;
        }

        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }

        .a4-container {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: auto;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .preview-pane {
            overflow-y: auto;
            background: #f1f5f9;
            height: calc(100vh - 64px);
            padding: 40px 0;
        }

        .sidebar { height: calc(100vh - 64px); overflow-y: auto; background-color: #ffffff; }

        .section-item {
            cursor: grab;
            background: #fff;
            border: 1px solid #f1f5f9;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .section-item:hover { border-color: var(--primary-color); }

        .cv-content { 
            font-family: var(--font-family); 
            color: #1e293b; 
            word-wrap: break-word;
            font-size: var(--base-font-size);
        }
        
        .cv-header { 
            border-bottom: 3px solid var(--primary-color); 
            padding-bottom: 1.5rem; 
            margin-bottom: 2rem;
            text-align: var(--header-align);
        }
        
        .cv-section-title { 
            color: var(--primary-color); 
            font-weight: bold; 
            text-transform: uppercase; 
            border-bottom: 1px solid #f1f5f9;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-size: 1.05em;
            letter-spacing: 0.05em;
        }

        .input-group { background: #fdfdfd; border: 1px solid #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        .drag-handle { color: #cbd5e1; cursor: grab; }
        
        .field-label { font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }

        .add-btn {
            color: var(--primary-color);
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .add-btn:hover { background: #f1f5f9; }

        .add-item-btn {
            color: var(--primary-color);
            font-size: 10px;
            font-weight: 800;
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .add-item-btn:hover { background: #f1f5f9; }

        .skill-tag {
            background-color: #f1f5f9;
            color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
            display: inline-block;
            margin: 2px;
            border: 1px solid #e2e8f0;
        }

        .format-btn {
            border: 1px solid #f1f5f9;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-size: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #64748b;
        }
        .format-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .align-group button {
            flex: 1;
            padding: 8px;
            background: #ffffff;
            border: 1px solid #f1f5f9;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            color: #64748b;
        }
        .align-group button.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .delete-btn-sm {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: #f87171;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #fee2e2;
            background: #fef2f2;
            transition: all 0.2s;
        }
        .delete-btn-sm:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .sidebar-section-title {
            font-size: 10px;
            font-weight: 900;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: block;
        }

        .glow-green {
            color: var(--brand-green);
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.7);
        }

        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white border-b px-6 py-3 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div id="logo-icon" class="w-10 h-10 flex items-center justify-center">
                <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 5px rgba(74, 222, 128, 0.5));">
                    <rect x="5" y="5" width="90" height="90" rx="12" fill="#4ade80" />
                    <rect x="20" y="20" width="25" height="25" rx="4" fill="white"/> 
                    <rect x="55" y="20" width="25" height="6" rx="2" fill="white" fill-opacity="0.9"/>
                    <rect x="55" y="32" width="25" height="6" rx="2" fill="white" fill-opacity="0.9"/>
                    <rect x="55" y="44" width="15" height="6" rx="2" fill="white" fill-opacity="0.9"/>
                    <rect x="20" y="62" width="60" height="8" rx="2" fill="white" fill-opacity="0.7"/>
                    <rect x="20" y="77" width="60" height="8" rx="2" fill="white" fill-opacity="0.7"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">
                <span class="glow-green">Evolve</span> 
                <span class="text-black">Resume</span>
            </h1>
        </div>
        <button onclick="downloadPDF()" class="bg-black hover:bg-zinc-800 text-[#4ade80] px-6 py-2 rounded-xl font-bold shadow-lg transition-all active:scale-95 border border-zinc-800" id="export-btn" style="text-shadow: 0 0 8px rgba(74, 222, 128, 0.5);">
            Export PDF
        </button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-[450px] bg-white border-r sidebar no-print p-6 space-y-8">
            <section>
                <h2 class="sidebar-section-title">Branding & Fonts</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <span class="field-label">Theme Color</span>
                        <input type="color" id="themeColor" value="#000000" oninput="updateStyle()" class="w-full h-10 p-1 cursor-pointer bg-white border border-slate-100 rounded-lg">
                    </div>
                    <div>
                        <span class="field-label">Font Family</span>
                        <select id="fontFamily" onchange="updateStyle()" class="w-full h-10 px-2 border border-slate-100 rounded-lg bg-slate-50 text-sm outline-none focus:border-slate-500">
                            <optgroup label="Sans Serif">
                                <option value="'Inter', sans-serif" selected>Inter (Modern)</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="Arial, sans-serif">Arial</option>
                            </optgroup>
                            <optgroup label="Serif">
                                <option value="'Lora', serif">Lora (Elegant)</option>
                                <option value="'Merriweather', serif">Merriweather</option>
                                <option value="'Playfair Display', serif">Playfair Display</option>
                                <option value="'Times New Roman', Times, serif">Times New Roman</option>
                            </optgroup>
                            <optgroup label="Monospace">
                                <option value="'Roboto Mono', monospace">Roboto Mono</option>
                                <option value="'Source Code Pro', monospace">Source Code Pro</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="sidebar-section-title">Typography & Layout</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="field-label">Content Scale</span>
                        <div class="flex items-center gap-3">
                            <input type="range" id="fontSize" min="10" max="22" value="14" oninput="updateStyle()" class="w-32 accent-slate-800">
                            <span id="fontSizeVal" class="text-xs font-bold text-slate-500 w-8">14px</span>
                        </div>
                    </div>
                    
                    <div>
                        <span class="field-label">Header Alignment</span>
                        <div class="flex align-group border border-slate-100 rounded-xl overflow-hidden">
                            <button onclick="setHeaderAlign('left')" id="h-btn-left" class="active border-r border-slate-100">Left</button>
                            <button onclick="setHeaderAlign('center')" id="h-btn-center" class="border-r border-slate-100">Center</button>
                            <button onclick="setHeaderAlign('right')" id="h-btn-right">Right</button>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="sidebar-section-title">Resume Structure</h2>
                <div id="sectionSortable"></div>
                <button onclick="createNewSection()" class="add-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    Add List Section
                </button>
            </section>

            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="sidebar-section-title mb-0">Contact Details</h2>
                    <button onclick="addPersonalInfoField()" class="add-item-btn">+ FIELD</button>
                </div>
                <div id="personalInfoInputs" class="space-y-3"></div>
            </section>

            <div id="dynamicSectionEditors" class="space-y-10"></div>
        </aside>

        <section class="flex-1 preview-pane">
            <div id="cv-container" class="a4-container">
                <div id="cv-target" class="cv-content"></div>
            </div>
        </section>
    </main>

    <script>
        let sectionOrder = ['profile', 'skills', 'experience', 'education'];
        let config = { headerAlign: 'left' };
        
        const data = {
            personal: {
                name: "Alexander Hamilton",
                title: "Full Stack Developer & UI Designer",
                details: [
                    { label: "Email", value: "alexander.h@example.com" },
                    { label: "Phone", value: "+1 (555) 000-1111" },
                    { label: "Location", value: "New York, NY" }
                ]
            },
            sections: {
                profile: { 
                    name: 'Professional Profile', 
                    type: 'text', 
                    content: 'Detail-oriented Full Stack Developer with 5+ years of experience building scalable web applications.',
                    format: { bold: false, italic: false, underline: false, align: 'left' }
                },
                skills: {
                    name: 'Technical Skills',
                    type: 'tags',
                    content: 'JavaScript, React, Node.js, Python, Tailwind CSS, PostgreSQL, Figma, AWS',
                    format: { bold: false, italic: false, underline: false, align: 'left' }
                },
                experience: { 
                    name: 'Work Experience', 
                    type: 'list', 
                    format: { bold: false, italic: false, underline: false, align: 'left' },
                    items: [
                        { title: 'Senior Developer', company: 'TechFlow Solutions', date: '2021 - Present', desc: '• Led development of a microservices-based SaaS platform.\n• Managed a team of 4 junior developers.' }
                    ] 
                },
                education: { 
                    name: 'Education', 
                    type: 'list', 
                    format: { bold: false, italic: false, underline: false, align: 'left' },
                    items: [
                        { title: 'B.S. in Computer Science', company: 'State University', date: '2014 - 2018', desc: 'Graduated with Honors.' }
                    ] 
                }
            }
        };

        function setHeaderAlign(val) {
            config.headerAlign = val;
            ['left', 'center', 'right'].forEach(a => {
                document.getElementById('h-btn-' + a).classList.toggle('active', a === val);
            });
            updateStyle();
        }

        function toggleSectionFormat(sectionId, type) {
            data.sections[sectionId].format[type] = !data.sections[sectionId].format[type];
            render();
            renderEditors();
        }

        function setSectionAlign(sectionId, align) {
            data.sections[sectionId].format.align = align;
            render();
            renderEditors();
        }

        function addPersonalInfoField() {
            data.personal.details.push({ label: "Label", value: "" });
            refreshUI();
        }

        function removePersonalInfoField(index) {
            data.personal.details.splice(index, 1);
            refreshUI();
        }

        function createNewSection(afterId = null) {
            const id = 'custom_' + Date.now();
            data.sections[id] = { 
                name: 'New Section', 
                type: 'list', 
                items: [{title: '', company: '', date: '', desc: ''}],
                format: { bold: false, italic: false, underline: false, align: 'left' }
            };
            
            if (afterId) {
                const index = sectionOrder.indexOf(afterId);
                sectionOrder.splice(index + 1, 0, id);
            } else {
                sectionOrder.push(id);
            }
            refreshUI();
        }

        function addListItem(sectionId) {
            data.sections[sectionId].items.push({title:'', company:'', date:'', desc:''});
            renderEditors();
            render();
        }

        function removeSection(id) {
            delete data.sections[id];
            sectionOrder = sectionOrder.filter(sid => sid !== id);
            refreshUI();
        }

        function refreshUI() {
            renderPersonalInfoInputs();
            renderSortable();
            renderEditors();
            render();
        }

        function renderPersonalInfoInputs() {
            const container = document.getElementById('personalInfoInputs');
            let html = `
                <input type="text" value="${data.personal.name}" oninput="data.personal.name = this.value; render();" placeholder="Full Name" class="w-full p-2 border border-slate-100 rounded-lg font-bold text-slate-700 outline-none focus:border-slate-300">
                <input type="text" value="${data.personal.title}" oninput="data.personal.title = this.value; render();" placeholder="Job Title" class="w-full p-2 border border-slate-100 rounded-lg text-sm text-slate-500 outline-none focus:border-slate-300">
            `;
            data.personal.details.forEach((field, i) => {
                html += `
                    <div class="flex gap-2 items-center group">
                        <input type="text" value="${field.label}" oninput="data.personal.details[${i}].label = this.value; render();" class="w-24 p-2 border border-slate-100 rounded-lg text-[10px] font-bold uppercase bg-slate-50 text-slate-400 outline-none focus:border-slate-300" placeholder="Label">
                        <input type="text" value="${field.value}" oninput="data.personal.details[${i}].value = this.value; render();" class="flex-1 p-2 border border-slate-100 rounded-lg text-sm text-slate-600 outline-none focus:border-slate-300" placeholder="Value">
                        <button onclick="removePersonalInfoField(${i})" class="text-red-300 hover:text-red-500 transition-opacity opacity-0 group-hover:opacity-100 text-lg">×</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderSortable() {
            const container = document.getElementById('sectionSortable');
            container.innerHTML = sectionOrder.map(id => `
                <div class="section-item" data-id="${id}">
                    <span class="drag-handle">☰</span>
                    <span class="text-sm font-semibold truncate flex-1 text-slate-600">${data.sections[id].name}</span>
                </div>
            `).join('');
        }

        function renderEditors() {
            const container = document.getElementById('dynamicSectionEditors');
            container.innerHTML = sectionOrder.map(id => {
                const s = data.sections[id];
                const f = s.format;
                
                let controls = `
                    <div class="flex items-center gap-1 mb-2 bg-slate-50 p-1 rounded-lg">
                        <button onclick="toggleSectionFormat('${id}', 'bold')" class="format-btn ${f.bold ? 'active' : ''} font-bold">B</button>
                        <button onclick="toggleSectionFormat('${id}', 'italic')" class="format-btn ${f.italic ? 'active' : ''} italic">I</button>
                        <button onclick="toggleSectionFormat('${id}', 'underline')" class="format-btn ${f.underline ? 'active' : ''} underline">U</button>
                        <div class="h-4 w-px bg-slate-200 mx-1"></div>
                        <button onclick="setSectionAlign('${id}', 'left')" class="format-btn ${f.align === 'left' ? 'active' : ''}">L</button>
                        <button onclick="setSectionAlign('${id}', 'center')" class="format-btn ${f.align === 'center' ? 'active' : ''}">C</button>
                        <button onclick="setSectionAlign('${id}', 'right')" class="format-btn ${f.align === 'right' ? 'active' : ''}">R</button>
                    </div>
                `;

                let inner = '';
                if (s.type === 'list') {
                    inner = s.items.map((item, i) => `
                        <div class="input-group relative group">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[9px] font-bold text-slate-300 uppercase">Item ${i+1}</span>
                                <button onclick="data.sections['${id}'].items.splice(${i},1); renderEditors(); render();" class="delete-btn-sm">Delete Item</button>
                            </div>
                            <input type="text" value="${item.title}" oninput="data.sections['${id}'].items[${i}].title = this.value; render();" class="w-full p-2 mb-2 border rounded text-sm font-bold" placeholder="Title (e.g. Job Role)">
                            <div class="flex gap-2 mb-2">
                                <input type="text" value="${item.company}" oninput="data.sections['${id}'].items[${i}].company = this.value; render();" class="flex-1 p-2 border rounded text-xs" placeholder="Organization">
                                <input type="text" value="${item.date}" oninput="data.sections['${id}'].items[${i}].date = this.value; render();" class="w-24 p-2 border rounded text-xs" placeholder="Date/Period">
                            </div>
                            <textarea oninput="data.sections['${id}'].items[${i}].desc = this.value; render();" class="w-full p-2 border rounded text-xs" rows="2" placeholder="Description...">${item.desc}</textarea>
                        </div>
                    `).join('');
                } else {
                    inner = `<textarea oninput="data.sections['${id}'].content = this.value; render();" class="w-full p-2 border border-slate-100 rounded-lg text-sm text-slate-600 outline-none focus:border-slate-300" rows="3">${s.content}</textarea>`;
                }

                return `
                    <div class="border-t border-slate-100 pt-8 mt-4 first:border-0 first:pt-0">
                        <div class="flex justify-between items-center mb-2">
                             <input type="text" value="${s.name}" oninput="data.sections['${id}'].name = this.value; render(); renderSortable();" class="font-black text-black uppercase text-[11px] tracking-widest bg-transparent border-none p-0 focus:ring-0 w-2/3">
                             <div class="flex gap-2">
                                ${s.type === 'list' ? `<button onclick="addListItem('${id}')" class="add-item-btn">+ ITEM</button>` : ''}
                                <button onclick="removeSection('${id}')" class="text-xs font-bold text-red-400 hover:text-red-600 uppercase px-2 py-1 rounded border border-red-50 hover:bg-red-50 transition-all">Delete Section</button>
                             </div>
                        </div>
                        ${controls}
                        ${inner}
                        <button onclick="createNewSection('${id}')" class="add-btn mt-4 text-[9px]">+ Insert List Section Below</button>
                    </div>
                `;
            }).join('');
        }

        function updateStyle() {
            const themeColor = document.getElementById('themeColor').value;
            const fs = document.getElementById('fontSize').value;
            document.getElementById('fontSizeVal').innerText = fs + 'px';

            document.documentElement.style.setProperty('--primary-color', themeColor);
            document.documentElement.style.setProperty('--font-family', document.getElementById('fontFamily').value);
            document.documentElement.style.setProperty('--base-font-size', fs + 'px');
            document.documentElement.style.setProperty('--header-align', config.headerAlign);
            
            render();
        }

        function render() {
            const p = data.personal;
            
            let contactHtml = p.details
                .filter(d => d.value.trim() !== "")
                .map(d => `<span class="whitespace-nowrap"><span style="color: var(--primary-color); font-weight: 700;">${d.label}:</span> ${d.value}</span>`)
                .join(' <span style="color: #cbd5e1">•</span> ');

            let html = `<div class="cv-header">
                <h1 class="text-4xl font-extrabold tracking-tight" style="color: var(--primary-color)">${p.name}</h1>
                <div class="text-xl text-slate-500 font-medium mt-1">${p.title}</div>
                <div class="text-[10px] uppercase tracking-wider text-slate-500 mt-5 flex flex-wrap gap-x-4 gap-y-1 ${config.headerAlign === 'center' ? 'justify-center' : config.headerAlign === 'right' ? 'justify-end' : ''}">${contactHtml}</div>
            </div>`;

            sectionOrder.forEach(id => {
                const s = data.sections[id];
                if (!s) return;
                const f = s.format;
                const style = `text-align: ${f.align}; font-weight: ${f.bold ? 'bold' : 'normal'}; font-style: ${f.italic ? 'italic' : 'normal'}; text-decoration: ${f.underline ? 'underline' : 'none'}; margin-bottom: 1.5rem;`;
                const flexAlign = f.align === 'center' ? 'justify-center' : f.align === 'right' ? 'justify-end' : '';

                html += `<div style="${style}"><div class="cv-section-title">${s.name}</div>`;
                
                if (s.type === 'list') {
                    html += s.items.map(i => `
                        <div class="mb-4">
                            <div class="flex items-baseline mb-0.5 ${flexAlign} gap-2">
                                <div class="font-bold text-slate-800">${i.title}</div>
                                <div class="text-[10px] text-slate-500 font-bold bg-slate-50 px-2 py-0.5 rounded">${i.date}</div>
                            </div>
                            <div class="text-[13px] font-bold mb-1" style="color: var(--primary-color)">${i.company}</div>
                            <div class="text-xs text-slate-600 leading-relaxed whitespace-pre-line">${i.desc}</div>
                        </div>`).join('');
                } else if (s.type === 'tags') {
                    html += `<div class="flex flex-wrap gap-1 ${flexAlign}">`;
                    s.content.split(',').forEach(tag => {
                        if(tag.trim()) html += `<span class="skill-tag">${tag.trim()}</span>`;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="leading-relaxed text-slate-700 whitespace-pre-line text-sm">${s.content}</div>`;
                }
                html += `</div>`;
            });
            document.getElementById('cv-target').innerHTML = html;
        }

        function downloadPDF() {
            const element = document.getElementById('cv-container');
            html2pdf().from(element).set({
                margin: 0,
                filename: 'Evolve_Resume.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        Sortable.create(document.getElementById('sectionSortable'), {
            animation: 150,
            onEnd: () => {
                sectionOrder = Array.from(document.querySelectorAll('.section-item')).map(el => el.dataset.id);
                renderEditors();
                render();
            }
        });

        window.onload = () => {
            updateStyle();
            refreshUI();
        };
    </script>
</body>
</html>
